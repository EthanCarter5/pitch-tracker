<style>
  :root {
    --navy: #0f1535;
    --navy2: #1a2148;
    --red: #c0392b;
    --red2: #e74c3c;
    --white: #ffffff;
    --off-white: #f4f5f8;
    --gray: #8892a4;
    --light: #dde1ea;
    --gold: #f0b429;
    --green: #27ae60;
    --panel: #161d3f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CAMO TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80px 60px at 10% 20%, #c0392b22 0%, transparent 70%),
      radial-gradient(ellipse 120px 80px at 85% 10%, #1a214822 0%, transparent 70%),
      radial-gradient(ellipse 60px 90px at 50% 80%, #c0392b11 0%, transparent 70%),
      radial-gradient(ellipse 200px 100px at 20% 70%, #1a214833 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding-bottom: 40px; }

  /* HEADER */
  .header {
    background: linear-gradient(180deg, #0a0f26 0%, var(--navy2) 100%);
    border-bottom: 3px solid var(--red);
    padding: 10px 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-diamond {
    width: 28px; height: 28px;
    background: var(--red);
    transform: rotate(45deg);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-diamond span {
    transform: rotate(-45deg);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 11px; color: white;
  }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 1px; }
  .header-sub { font-size: 9px; color: var(--red2); letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
  .header-count {
    background: var(--red);
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 22px;
    letter-spacing: 1px;
    min-width: 56px; text-align: center;
  }
  .header-count span { font-size: 11px; display: block; letter-spacing: 1px; font-weight: 600; }

  /* GAME INFO BAR */
  .game-bar {
    background: var(--panel);
    padding: 8px 16px;
    display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid #ffffff11;
  }
  .game-field { flex: 1; min-width: 100px; }
  .game-field label { font-size: 9px; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .game-field input {
    background: #ffffff0f;
    border: 1px solid #ffffff22;
    border-radius: 4px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    padding: 5px 8px;
    width: 100%;
    outline: none;
  }
  .game-field input:focus { border-color: var(--red); }

  /* SECTIONS */
  .section { padding: 10px 14px 0; }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 11px;
    letter-spacing: 2px; color: var(--red2);
    text-transform: uppercase;
    margin-bottom: 7px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: #ffffff11; }

  /* BUTTON GRIDS */
  .btn-grid { display: grid; gap: 6px; }
  .btn-grid-2 { grid-template-columns: repeat(2, 1fr); }
  .btn-grid-3 { grid-template-columns: repeat(3, 1fr); }
  .btn-grid-4 { grid-template-columns: repeat(4, 1fr); }
  .btn-grid-5 { grid-template-columns: repeat(5, 1fr); }

  .opt-btn {
    background: var(--panel);
    border: 1.5px solid #ffffff18;
    border-radius: 6px;
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
    letter-spacing: 0.5px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .opt-btn:active { transform: scale(0.96); }
  .opt-btn.selected {
    background: var(--red);
    border-color: var(--red2);
    color: var(--white);
    box-shadow: 0 0 12px #c0392b55;
  }
  .opt-btn.selected.green {
    background: var(--green);
    border-color: #2ecc71;
    box-shadow: 0 0 12px #27ae6055;
  }
  .opt-btn.selected.gold {
    background: var(--gold);
    border-color: #f6c94e;
    color: var(--navy);
    box-shadow: 0 0 12px #f0b42955;
  }
  .opt-btn sub { font-size: 9px; display: block; font-weight: 600; color: inherit; opacity: 0.8; letter-spacing: 0; }

  /* ZONE CANVAS */
  .zone-wrap { display: flex; flex-direction: column; align-items: center; padding: 4px 0; gap: 6px; }
  .zone-canvas-wrap {
    position: relative;
    touch-action: none;
    cursor: crosshair;
  }
  .zone-canvas-wrap canvas { display: block; border-radius: 6px; }
  .zone-coord-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    min-height: 16px;
    text-align: center;
  }
  .zone-clear-btn {
    background: transparent;
    border: 1px solid #ffffff22;
    border-radius: 4px;
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    padding: 3px 12px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .zone-clear-btn:active { border-color: var(--red); color: var(--red); }

  /* EXEC */
  .exec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .exec-btn {
    padding: 12px 4px;
    border-radius: 6px;
    border: 1.5px solid #ffffff18;
    background: var(--panel);
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.12s;
  }
  .exec-btn:active { transform: scale(0.96); }
  .exec-btn sub { display: block; font-size: 9px; font-weight: 600; letter-spacing: 0; opacity: 0.8; }
  .exec-btn.sel-plus { background: var(--green); border-color: #2ecc71; color: white; box-shadow: 0 0 12px #27ae6055; }
  .exec-btn.sel-check { background: var(--gold); border-color: #f6c94e; color: var(--navy); box-shadow: 0 0 12px #f0b42955; }
  .exec-btn.sel-minus { background: var(--red); border-color: var(--red2); color: white; box-shadow: 0 0 12px #c0392b55; }

  /* NOTES */
  .notes-input {
    width: 100%;
    background: #ffffff0a;
    border: 1.5px solid #ffffff18;
    border-radius: 6px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    min-height: 70px;
  }
  .notes-input:focus { border-color: var(--red); }
  .notes-input::placeholder { color: var(--gray); font-size: 13px; }

  /* LOG PITCH BUTTON */
  .log-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--red) 0%, #a93226 100%);
    border: none;
    border-radius: 8px;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 20px;
    letter-spacing: 2px;
    padding: 16px;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.12s;
    box-shadow: 0 4px 20px #c0392b44;
    text-transform: uppercase;
  }
  .log-btn:active { transform: scale(0.98); box-shadow: 0 2px 10px #c0392b44; }
  .log-btn:disabled { opacity: 0.35; cursor: default; }

  /* LIVE FEED */
  .feed-wrap { padding: 10px 14px; }
  .feed-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 11px;
    letter-spacing: 2px; color: var(--red2);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .feed-count-badge {
    background: var(--red);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }
  .pitch-log { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow-y: auto; }
  .pitch-row {
    background: var(--panel);
    border: 1px solid #ffffff0f;
    border-radius: 6px;
    padding: 7px 10px;
    display: grid;
    grid-template-columns: 24px 40px 1fr 1fr 28px 50px;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .pitch-row:last-child { border-color: var(--red); }
  .pitch-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; color: var(--gray); font-size: 11px; }
  .pitch-count-disp { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--white); font-size: 13px; }
  .pitch-type-tag {
    background: var(--navy);
    border-radius: 3px;
    padding: 2px 5px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 11px;
    display: inline-block;
  }
  .pitch-result-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 12px;
    color: var(--gold);
  }
  .exec-tag { font-size: 14px; text-align: center; }
  .pitch-note { font-size: 10px; color: var(--gray); grid-column: 1 / -1; margin-top: 2px; font-style: italic; }
  .has-note { border-left: 2px solid var(--gold); }

  /* TOTALS BAR */
  .totals-bar {
    background: var(--panel);
    border-top: 2px solid var(--red);
    border-bottom: 1px solid #ffffff11;
    padding: 8px 14px;
    display: flex; gap: 6px; overflow-x: auto;
  }
  .total-chip {
    background: var(--navy);
    border-radius: 5px;
    padding: 5px 10px;
    text-align: center;
    flex-shrink: 0;
    min-width: 52px;
  }
  .total-chip .tc-label { font-size: 9px; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; }
  .total-chip .tc-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; color: var(--white); line-height: 1; }
  .total-chip .tc-pct { font-size: 9px; color: var(--gold); font-weight: 600; }
  .total-chip.highlight .tc-val { color: var(--red2); }

  /* UNDO + EXPORT */
  .action-bar { display: flex; gap: 8px; padding: 10px 14px 0; }
  .undo-btn {
    flex: 1;
    background: transparent;
    border: 1.5px solid #ffffff22;
    border-radius: 6px;
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .undo-btn:active { border-color: var(--red); color: var(--red); }
  .export-btn {
    flex: 2;
    background: var(--navy2);
    border: 1.5px solid var(--red);
    border-radius: 6px;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    padding: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.12s;
  }
  .export-btn:active { background: var(--red); }

  /* INNING DIVIDER */
  .inning-div {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 14px;
  }
  .inning-div-line { flex: 1; height: 1px; background: #ffffff11; }
  .inning-div-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--gray); letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* INNING SELECTOR */
  .inning-row { display: flex; align-items: center; gap: 8px; padding: 0 14px; margin-bottom: 6px; }
  .inning-label { font-size: 11px; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; flex-shrink: 0; }
  .inning-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .inn-btn {
    background: var(--panel);
    border: 1.5px solid #ffffff18;
    border-radius: 4px;
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 13px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .inn-btn.selected { background: var(--navy2); border-color: var(--red); color: var(--white); }

  .divider { height: 1px; background: #ffffff08; margin: 8px 14px; }
</style>

  { key: '1B', label: '1B',   sub: 'Single' },
  { key: '2B', label: '2B',   sub: 'Double' },
  { key: '3B', label: '3B',   sub: 'Triple' },
  { key: 'HR', label: 'HR',   sub: 'Homer' },
  { key: 'G',  label: 'GO',   sub: 'Ground' },
  { key: 'F',  label: 'FO',   sub: 'Fly Out' },
];

// Zone is now stored as {x, y} normalized 0-1 coordinates

const EXEC = [
  { key: '+', label: '+', sub: 'On Target', cls: 'sel-plus' },
  { key: '✓', label: '★', sub: 'Perfect', cls: 'sel-check' },
  { key: '-', label: '−', sub: 'Missed',   cls: 'sel-minus' },
];

const INNINGS = [1,2,3,4,5,6,7];

function countStr(b, s) { return `${b}-${s}`; }


// Zone label from normalized coords
function zoneLabel(x, y) {
  const col = x < 0.33 ? 'Out' : x < 0.67 ? 'Mid' : 'In';
  const row = y < 0.33 ? 'Up' : y < 0.67 ? 'Mid' : 'Low';
  if (row === 'Mid' && col === 'Mid') return 'Heart';
  return row + '/' + col;
}

// Pitch color by type
function pitchColor(type) {
  return { FBI: '#e74c3c', FBE: '#e67e22', FBO: '#f0b429', OS: '#3498db' }[type] || '#fff';
}

function ZoneCanvas({ zone, setZone, pitches, canvasRef }) {
  const W = 280, H = 230;
  // Strike zone bounds in canvas coords (normalized)
  // Plate: 17 inches wide. We'll show ~24in wide context
  // Strike zone box: 30% to 70% x, 20% to 75% y
  const SZ = { x1: 0.28, x2: 0.72, y1: 0.18, y2: 0.76 };

  const drawCanvas = React.useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0f1535';
    ctx.fillRect(0, 0, W, H);

    // Dirt/grass feel - subtle gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a1028');
    grad.addColorStop(1, '#0f1535');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Grid lines (faint)
    ctx.strokeStyle = '#ffffff08';
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(W * i/4, 0); ctx.lineTo(W * i/4, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, H * i/4); ctx.lineTo(W, H * i/4); ctx.stroke();
    }

    // Ball zone heatmap from previous pitches (last 20)
    const recent = pitches.slice(-20);
    recent.forEach(p => {
      if (p.zoneX === null || p.zoneX === undefined) return;
      const cx = p.zoneX * W, cy = p.zoneY * H;
      const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18);
      const c = pitchColor(p.thrown);
      rg.addColorStop(0, c + '33');
      rg.addColorStop(1, c + '00');
      ctx.fillStyle = rg;
      ctx.fillRect(cx - 18, cy - 18, 36, 36);
    });

    // Strike zone box
    const szX = SZ.x1 * W, szY = SZ.y1 * H;
    const szW = (SZ.x2 - SZ.x1) * W, szH = (SZ.y2 - SZ.y1) * H;

    // Zone thirds lines (inside strike zone)
    ctx.strokeStyle = '#ffffff18';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([3, 3]);
    // Vertical thirds
    for (let i = 1; i < 3; i++) {
      const lx = szX + szW * i/3;
      ctx.beginPath(); ctx.moveTo(lx, szY); ctx.lineTo(lx, szY + szH); ctx.stroke();
    }
    // Horizontal thirds
    for (let i = 1; i < 3; i++) {
      const ly = szY + szH * i/3;
      ctx.beginPath(); ctx.moveTo(szX, ly); ctx.lineTo(szX + szW, ly); ctx.stroke();
    }
    ctx.setLineDash([]);

    // Strike zone border
    ctx.strokeStyle = '#ffffff55';
    ctx.lineWidth = 2;
    ctx.strokeRect(szX, szY, szW, szH);

    // Inner highlight
    ctx.strokeStyle = '#c0392b88';
    ctx.lineWidth = 1;
    ctx.strokeRect(szX + 2, szY + 2, szW - 4, szH - 4);

    // Labels
    ctx.fillStyle = '#ffffff30';
    ctx.font = 'bold 9px Barlow Condensed, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('STRIKE ZONE', szX + szW/2, szY - 5);

    // Catcher perspective labels
    ctx.fillStyle = '#ffffff22';
    ctx.font = '8px Barlow, sans-serif';
    ctx.fillText('ARM SIDE', szX - 22, szY + szH/2);
    ctx.fillText('GLOVE', szX + szW + 22, szY + szH/2);
    ctx.fillText('UP', szX + szW + 8, szY + 8);
    ctx.fillText('DOWN', szX + szW + 8, szY + szH - 4);

    // Home plate shape at bottom
    const pCx = W/2, pY = H - 14, pW = 32, pH = 10;
    ctx.beginPath();
    ctx.moveTo(pCx - pW/2, pY);
    ctx.lineTo(pCx + pW/2, pY);
    ctx.lineTo(pCx + pW/2, pY + pH/2);
    ctx.lineTo(pCx, pY + pH);
    ctx.lineTo(pCx - pW/2, pY + pH/2);
    ctx.closePath();
    ctx.fillStyle = '#ffffff18';
    ctx.fill();
    ctx.strokeStyle = '#ffffff40';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Previous pitch dots (last 8, faded)
    recent.slice(-8).forEach((p, i) => {
      if (p.zoneX === null || p.zoneX === undefined) return;
      const cx = p.zoneX * W, cy = p.zoneY * H;
      const alpha = 0.25 + (i / 8) * 0.35;
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fillStyle = pitchColor(p.thrown) + Math.round(alpha * 255).toString(16).padStart(2,'0');
      ctx.fill();
      ctx.strokeStyle = '#00000044';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      // Pitch type label on older dots
      if (i < 6) {
        ctx.fillStyle = '#ffffff55';
        ctx.font = 'bold 6px Barlow Condensed, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.thrown, cx, cy - 7);
      }
    });

    // Current tap dot
    if (zone && zone.x !== undefined) {
      const cx = zone.x * W, cy = zone.y * H;
      // Outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, 11, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff88';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Inner dot
      ctx.beginPath();
      ctx.arc(cx, cy, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#e74c3c';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Crosshair lines
      ctx.strokeStyle = '#ffffff44';
      ctx.lineWidth = 0.8;
      ctx.setLineDash([2, 3]);
      ctx.beginPath(); ctx.moveTo(cx, szY); ctx.lineTo(cx, szY + szH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(szX, cy); ctx.lineTo(szX + szW, cy); ctx.stroke();
      ctx.setLineDash([]);
    }

  }, [zone, pitches]);

  React.useEffect(() => { drawCanvas(); }, [drawCanvas]);

  const getCoords = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    return {
      x: Math.max(0, Math.min(1, ((clientX - rect.left) * scaleX) / W)),
      y: Math.max(0, Math.min(1, ((clientY - rect.top) * scaleY) / H)),
    };
  };

  const handleTap = (e) => {
    e.preventDefault();
    const canvas = canvasRef.current;
    if (!canvas) return;
    const coords = getCoords(e, canvas);
    setZone(coords);
  };

  const label = zone && zone.x !== undefined ? zoneLabel(zone.x, zone.y) : null;
  const inZone = zone && zone.x >= SZ.x1 && zone.x <= SZ.x2 && zone.y >= SZ.y1 && zone.y <= SZ.y2;

  return React.createElement('div', { className: 'zone-wrap' },
    React.createElement('div', { className: 'zone-canvas-wrap',
      style: { width: '100%', maxWidth: 300 }
    },
      React.createElement('canvas', {
        ref: canvasRef,
        width: W, height: H,
        style: { width: '100%', borderRadius: 8, border: zone ? '1.5px solid #c0392b66' : '1.5px solid #ffffff18' },
        onMouseDown: handleTap,
        onTouchStart: handleTap,
      })
    ),
    React.createElement('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
      React.createElement('div', { className: 'zone-coord-display' },
        label
          ? React.createElement('span', null,
              React.createElement('span', { style: { color: inZone ? '#27ae60' : '#e74c3c' } },
                inZone ? '● IN ZONE' : '● BALL'
              ),
              ' — ', label
            )
          : React.createElement('span', { style: { color: '#8892a4' } }, 'Tap to place pitch')
      ),
      zone && React.createElement('button', {
        className: 'zone-clear-btn',
        onClick: () => setZone(null)
      }, '✕ Clear')
    ),
    React.createElement('div', { style: { fontSize: 9, color: '#8892a4', letterSpacing: '0.5px', textAlign: 'center' } },
      'Catcher view  ·  Red dots = this AB  ·  Faded = previous pitches'
    )
  );
}

function App() {
  const [game, setGame] = useState({ date: '', opponent: '', pitcher: '' });
  const [pitches, setPitches] = useState([]);
  const [balls, setBalls] = useState(0);
  const [strikes, setStrikes] = useState(0);
  const [inning, setInning] = useState(1);

  // Current pitch state
  const [called, setCalled] = useState(null);
  const [thrown, setThrown] = useState(null);
  const [zone, setZone] = useState(null); // {x, y} normalized 0-1
  const zoneCanvasRef = React.useRef(null);
  const [exec, setExec] = useState(null);
  const [result, setResult] = useState(null);
  const [note, setNote] = useState('');

  const canLog = called && thrown && zone && zone.x !== undefined && exec && result;

  const advanceCount = useCallback((res) => {
    let b = balls, s = strikes;
    if (res === 'B')  { return b < 3 ? { b: b+1, s } : { b: 0, s: 0 }; }
    if (res === 'CS' || res === 'S') { return s < 2 ? { b, s: s+1 } : { b, s }; }
    if (res === 'FO') { return s < 2 ? { b, s: s+1 } : { b, s }; }
    if (res === 'K')  return { b: 0, s: 0 };
    if (res === 'BB') return { b: 0, s: 0 };
    if (res === 'BK') { return b < 3 ? { b: b+1, s } : { b: 0, s: 0 }; }
    if (['1B','2B','3B','HR','G','F','HBP','WP'].includes(res)) return { b: 0, s: 0 };
    return { b, s };
  }, [balls, strikes]);

  const logPitch = useCallback(() => {
    if (!canLog) return;
    const newPitch = {
      id: Date.now(),
      num: pitches.length + 1,
      inning,
      count: countStr(balls, strikes),
      called, thrown,
      zoneX: zone ? zone.x : null,
      zoneY: zone ? zone.y : null,
      zoneLabel: zone ? zoneLabel(zone.x, zone.y) : null,
      exec, result, note,
    };
    setPitches(prev => [...prev, newPitch]);
    const next = advanceCount(result);
    setBalls(next.b);
    setStrikes(next.s);
    // Reset
    setCalled(null); setThrown(null); setZone(null);
    setExec(null); setResult(null); setNote('');
  }, [canLog, pitches.length, inning, balls, strikes, called, thrown, zone, exec, result, note, advanceCount]);

  const undo = useCallback(() => {
    if (pitches.length === 0) return;
    const last = pitches[pitches.length - 1];
    setPitches(prev => prev.slice(0, -1));
    const [b, s] = last.count.split('-').map(Number);
    setBalls(b); setStrikes(s);
    setInning(last.inning);
  }, [pitches]);

  const exportCSV = useCallback(() => {
    const headers = ['#','Inning','Count','Called','Thrown','ZoneX','ZoneY','ZoneLabel','Execution','Result','Note'];
    const rows = pitches.map(p => [
      p.num, p.inning, p.count, p.called, p.thrown,
      p.zoneX !== null ? p.zoneX.toFixed(3) : '', p.zoneY !== null ? p.zoneY.toFixed(3) : '', p.zoneLabel||'',
      p.exec, p.result, `"${(p.note||'').replace(/"/g,'""')}"`
    ]);
    const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = game.date || new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `USA_Scout_${game.pitcher||'pitcher'}_${d}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }, [pitches, game]);

  const totals = useMemo(() => {
    const t = { total: pitches.length, strikes: 0, balls: 0, exec_plus: 0, exec_minus: 0, exec_check: 0 };
    const byType = {};
    PITCH_TYPES.forEach(pt => { byType[pt] = { thrown: 0, strikes: 0 }; });
    pitches.forEach(p => {
      if (['K','CS','S','FO','1B','2B','3B','HR','G','F','IP','HBP'].includes(p.result)) t.strikes++;
      if (['BB','BK','WP'].includes(p.result)) t.balls++;
      if (p.exec === '+') t.exec_plus++;
      if (p.exec === '-') t.exec_minus++;
      if (p.exec === '✓') t.exec_check++;
      if (byType[p.thrown]) {
        byType[p.thrown].thrown++;
        if (['K','CS','S','FO','1B','2B','3B','HR','G','F','IP','HBP'].includes(p.result)) {
          byType[p.thrown].strikes++;
        }
      }
    });
    return { ...t, byType };
  }, [pitches]);

  const recentPitches = [...pitches].reverse().slice(0, 15);

  return React.createElement('div', null,
    // HEADER
    React.createElement('div', { className: 'header' },
      React.createElement('div', { className: 'header-brand' },
        React.createElement('div', { className: 'header-diamond' },
          React.createElement('span', null, 'USA')
        ),
        React.createElement('div', null,
          React.createElement('div', { className: 'header-title' }, 'PITCH TRACKER'),
          React.createElement('div', { className: 'header-sub' }, 'USA Scout Carolina 13U')
        )
      ),
      React.createElement('div', { className: 'header-count' },
        React.createElement('span', null, 'COUNT'),
        `${balls}-${strikes}`
      )
    ),

    // GAME INFO
    React.createElement('div', { className: 'game-bar' },
      ['date','opponent','pitcher'].map(field =>
        React.createElement('div', { className: 'game-field', key: field },
          React.createElement('label', null, field),
          React.createElement('input', {
            type: field === 'date' ? 'date' : 'text',
            placeholder: field === 'opponent' ? 'vs. Team' : field === 'pitcher' ? 'Name' : '',
            value: game[field],
            onChange: e => setGame(g => ({ ...g, [field]: e.target.value }))
          })
        )
      )
    ),

    // TOTALS BAR
    pitches.length > 0 && React.createElement('div', { className: 'totals-bar' },
      React.createElement('div', { className: 'total-chip highlight' },
        React.createElement('div', { className: 'tc-label' }, 'Pitches'),
        React.createElement('div', { className: 'tc-val' }, totals.total)
      ),
      React.createElement('div', { className: 'total-chip' },
        React.createElement('div', { className: 'tc-label' }, 'S%'),
        React.createElement('div', { className: 'tc-val' }, totals.total ? Math.round(totals.strikes/totals.total*100) : '—'),
        React.createElement('div', { className: 'tc-pct' }, `${totals.strikes}/${totals.total}`)
      ),
      React.createElement('div', { className: 'total-chip' },
        React.createElement('div', { className: 'tc-label' }, 'Exec+'),
        React.createElement('div', { className: 'tc-val' }, totals.exec_plus + totals.exec_check)
      ),
      React.createElement('div', { className: 'total-chip' },
        React.createElement('div', { className: 'tc-label' }, 'Miss'),
        React.createElement('div', { className: 'tc-val' }, totals.exec_minus)
      ),
      ...PITCH_TYPES.map(pt =>
        React.createElement('div', { className: 'total-chip', key: pt },
          React.createElement('div', { className: 'tc-label' }, pt),
          React.createElement('div', { className: 'tc-val' }, totals.byType[pt].thrown),
          React.createElement('div', { className: 'tc-pct' },
            totals.byType[pt].thrown
              ? `${Math.round(totals.byType[pt].strikes/totals.byType[pt].thrown*100)}%S`
              : '—'
          )
        )
      )
    ),

    // INNING
    React.createElement('div', { style: { padding: '8px 14px 0' } },
      React.createElement('div', { className: 'inning-row' },
        React.createElement('div', { className: 'inning-label' }, 'Inning'),
        React.createElement('div', { className: 'inning-btns' },
          INNINGS.map(i =>
            React.createElement('div', {
              key: i,
              className: `inn-btn${inning === i ? ' selected' : ''}`,
              onClick: () => setInning(i)
            }, i)
          )
        )
      )
    ),

    // CALLED
    React.createElement('div', { className: 'section' },
      React.createElement('div', { className: 'section-label' }, 'Pitch Called'),
      React.createElement('div', { className: 'btn-grid btn-grid-4' },
        CALLED_OPTIONS.map(opt =>
          React.createElement('div', {
            key: opt.key,
            className: `opt-btn${called === opt.key ? ' selected' : ''}`,
            onClick: () => setCalled(opt.key)
          },
            opt.label,
            React.createElement('sub', null, opt.sub)
          )
        )
      )
    ),

    // THROWN
    React.createElement('div', { className: 'section' },
      React.createElement('div', { className: 'section-label' }, 'Pitch Thrown'),
      React.createElement('div', { className: 'btn-grid btn-grid-4' },
        THROWN_OPTIONS.map(opt =>
          React.createElement('div', {
            key: opt.key,
            className: `opt-btn${thrown === opt.key ? ' selected green' : ''}`,
            onClick: () => setThrown(opt.key)
          },
            opt.label,
            React.createElement('sub', null, opt.sub)
          )
        )
      )
    ),

    // ZONE - tap anywhere canvas
    React.createElement('div', { className: 'section' },
      React.createElement('div', { className: 'section-label' }, 'Location — Tap the Zone'),
      React.createElement(ZoneCanvas, {
        zone, setZone, pitches,
        canvasRef: zoneCanvasRef
      })
    ),

    // EXECUTION
    React.createElement('div', { className: 'section' },
      React.createElement('div', { className: 'section-label' }, 'Execution'),
      React.createElement('div', { className: 'exec-grid' },
        EXEC.map(e =>
          React.createElement('div', {
            key: e.key,
            className: `exec-btn${exec === e.key ? ` ${e.cls}` : ''}`,
            onClick: () => setExec(e.key)
          },
            e.label,
            React.createElement('sub', null, e.sub)
          )
        )
      )
    ),

    // RESULT
    React.createElement('div', { className: 'section' },
      React.createElement('div', { className: 'section-label' }, 'Result'),
      React.createElement('div', { className: 'btn-grid btn-grid-5' },
        RESULTS.map(r =>
          React.createElement('div', {
            key: r.key,
            className: `opt-btn${result === r.key ? ' selected gold' : ''}`,
            onClick: () => setResult(r.key)
          },
            r.label,
            React.createElement('sub', null, r.sub)
          )
        )
      )
    ),

    // NOTES
    React.createElement('div', { className: 'section' },
      React.createElement('div', { className: 'section-label' }, 'Play Note (optional)'),
      React.createElement('textarea', {
        className: 'notes-input',
        placeholder: 'Defense note, mental note, situation context...',
        value: note,
        onChange: e => setNote(e.target.value)
      })
    ),

    // LOG BUTTON
    React.createElement('div', { style: { padding: '4px 14px 0' } },
      React.createElement('button', {
        className: 'log-btn',
        disabled: !canLog,
        onClick: logPitch
      }, canLog ? `LOG PITCH #${pitches.length + 1}` : 'COMPLETE ALL FIELDS')
    ),

    // ACTION BAR
    pitches.length > 0 && React.createElement('div', { className: 'action-bar' },
      React.createElement('button', { className: 'undo-btn', onClick: undo }, '↩ Undo'),
      React.createElement('button', { className: 'export-btn', onClick: exportCSV }, `⬇ Export CSV (${pitches.length} pitches)`)
    ),

    // DIVIDER
    pitches.length > 0 && React.createElement('div', { className: 'divider' }),

    // LIVE FEED
    pitches.length > 0 && React.createElement('div', { className: 'feed-wrap' },
      React.createElement('div', { className: 'feed-title' },
        'PITCH LOG',
        React.createElement('span', { className: 'feed-count-badge' }, pitches.length)
      ),
      React.createElement('div', { className: 'pitch-log' },
        recentPitches.map(p =>
          React.createElement('div', {
            key: p.id,
            className: `pitch-row${p.note ? ' has-note' : ''}`
          },
            React.createElement('div', { className: 'pitch-num' }, `#${p.num}`),
            React.createElement('div', { className: 'pitch-count-disp' }, p.count),
            React.createElement('div', null,
              React.createElement('span', { className: 'pitch-type-tag', style: { fontSize: 10 } }, p.called),
              React.createElement('span', { style: { fontSize: 10, color: '#27ae60', marginLeft: 3 } }, `→${p.thrown}`)
            ),
            React.createElement('div', { className: 'pitch-result-tag' }, p.result),
            React.createElement('div', { className: 'exec-tag' },
              p.exec === '✓' ? '★' : p.exec === '+' ? '✓' : '✗'
            ),
            React.createElement('div', { style: { fontSize: 10, color: '#8892a4' } }, `Inn.${p.inning} ${p.zoneLabel||''}`),
            p.note ? React.createElement('div', { className: 'pitch-note' }, `📝 ${p.note}`) : null
          )
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('SW registered'))
      .catch(e => console.log('SW failed', e));
  });
}
</script>
</body>
</html>
